name: Stream

on:

  workflow_dispatch:

jobs:

  stream:

    runs-on: ubuntu-latest

    timeout-minutes: 360

    steps:

      - uses: actions/checkout@v4

      - name: Build Docker

        run: docker build -t yt-stream ./docker

      - name: Start Stream

        run: |

          docker run \
          -e INPUT_SOURCE="${{ secrets.INPUT_SOURCE }}" \
          -e YOUTUBE_STREAM_KEY="${{ secrets.YOUTUBE_STREAM_KEY }}" \
          yt-stream